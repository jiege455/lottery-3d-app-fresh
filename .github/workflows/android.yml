name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 34
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Remove Windows local.properties
        run: |
          rm -f android/local.properties
          rm -f local.properties

      - name: Get dependencies
        run: |
          rm -f pubspec.lock
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies
          flutter pub get

      - name: Build APK with Gradle directly
        run: |
          cd android
          export JAVA_HOME="${JAVA_HOME:-$RUNNER_JAVA_HOME}"
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          cd ..

      - name: Search for APK files
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Listing build outputs ==="
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk/"
          ls -la build/app/outputs/apk/release/ 2>/dev/null || echo "No apk/release/"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No android apk/release/"
          ls -la android/app/build/outputs/flutter-apk/ 2>/dev/null || echo "No android flutter-apk/"

      - name: Copy APK to expected location
        if: always()
        run: |
          mkdir -p build/app/outputs/flutter-apk/
          APK=$(find . -name "app-release.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" build/app/outputs/flutter-apk/app-release.apk
            echo "APK copied from: $APK"
            ls -la build/app/outputs/flutter-apk/app-release.apk
          else
            echo "ERROR: No APK found anywhere!"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 3
          if-no-files-found: warn

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            android/app/build/reports/**
            android/.gradle/daemon/*.out.log
          retention-days: 7
          if-no-files-found: ignore
