name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Get dependencies
        run: |
          rm -f pubspec.lock
          rm -f .flutter-plugins
          rm -f .flutter-plugins-dependencies
          flutter pub get

      - name: Build APK
        run: flutter build apk --release
        continue-on-error: true

      - name: Search for APK files
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Listing build output ==="
          ls -la build/app/outputs/ 2>/dev/null || echo "No build/app/outputs/"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk/"
          ls -la build/app/outputs/apk/ 2>/dev/null || echo "No apk/"
          ls -la build/app/outputs/apk/release/ 2>/dev/null || echo "No apk/release/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/apk/release/app-release.apk
          retention-days: 3
          if-no-files-found: warn

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            build/app/outputs/logs/**
            android/app/build/reports/**
            android/.gradle/daemon/*.out.log
          retention-days: 7
          if-no-files-found: ignore
