name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: cleanup-artifacts
    timeout-minutes: 30

    env:
      FLUTTER_BASE_URL: https://storage.googleapis.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & get deps
        run: |
          echo "=========================================="
          echo "=== Flutter Version ==="
          flutter --version
          echo "=========================================="
          echo "=== Cleaning build cache ==="
          rm -rf android/.gradle
          rm -rf android/build
          rm -rf android/app/build
          rm -rf build
          rm -rf .dart_tool
          echo "Cache cleaned successfully"
          echo "=========================================="
          echo "=== Accepting SDK licenses ==="
          yes | sdkmanager --licenses || true
          sdkmanager --list_installed || true
          echo "=========================================="
          echo "=== Running flutter clean ==="
          flutter clean
          echo "=========================================="
          echo "=== Getting dependencies ==="
          flutter pub get --verbose
          DEPS_EXIT_CODE=$?
          if [ $DEPS_EXIT_CODE -ne 0 ]; then
            echo "ERROR: flutter pub get failed with exit code $DEPS_EXIT_CODE"
            exit 1
          fi
          echo "=========================================="
          echo "=== Dependencies resolved successfully ==="

      - name: Build APK (with detailed logging)
        run: |
          echo "=========================================="
          echo "Starting APK build..."
          echo "=========================================="
          echo "Build environment info:"
          echo "- Flutter version:"
          flutter --version
          echo "- Java version:"
          java -version
          echo "- Gradle version (if available):"
          ./android/gradlew --version || true
          echo "=========================================="
          
          echo "Running build command..."
          set +e
          flutter build apk \
            --release \
            --target-platform android-arm64,android-arm \
            --no-tree-shake-icons \
            --verbose \
            2>&1 | tee build_output.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          
          echo "=========================================="
          echo "Build completed with exit code: $BUILD_EXIT_CODE"
          echo "=========================================="
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ ERROR: Build failed!"
            echo ""
            echo "Last 100 lines of build output:"
            tail -100 build_output.log || true
            exit 1
          fi
          
          echo "=========================================="
          echo "=== Checking for APK files ==="
          echo "=========================================="
          
          echo "Searching for .apk files in build directory..."
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found in build/"
          
          echo ""
          echo "Checking standard locations..."
          
          APK_FOUND=false
          APK_PATH=""
          
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ Found APK at: build/app/outputs/flutter-apk/app-release.apk"
            ls -lh build/app/outputs/flutter-apk/app-release.apk
            APK_FOUND=true
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          elif [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
            echo "✅ Found APK at: build/app/outputs/apk/release/app-release.apk"
            ls -lh build/app/outputs/apk/release/app-release.apk
            APK_FOUND=true
            APK_PATH="build/app/outputs/apk/release/app-release.apk"
          else
            echo "⚠️  APK not found in expected locations"
            echo ""
            echo "Searching entire project directory..."
            find . -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK files found anywhere"
            
            echo ""
            echo "Build output directory structure:"
            ls -laR build/ 2>/dev/null | head -50 || echo "No build directory or empty"
            
            if [ "$APK_FOUND" = false ]; then
              echo ""
              echo "❌ ERROR: No APK file was generated!"
              echo ""
              echo "Build log summary:"
              tail -200 build_output.log || true
              exit 1
            fi
          fi
          
          echo "=========================================="
          echo "✅ Build successful! APK location: $APK_PATH"
          echo "=========================================="

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/release/*.apk
          retention-days: 3
          if-no-files-found: error

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Flutter Version**: 3.24.5" >> $GITHUB_STEP_SUMMARY
          echo "- **Java Version**: 17 (Zulu)" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Platforms**: arm64, arm" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: Release" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: $(date)" >> $GITHUB_STEP_SUMMARY
